name: astrbot_plugin_music_together
display_name: "一起听歌"
desc: "和机器人一起听歌！支持多平台点歌、共享歌单、互动投票、音乐推荐与讨论"
help: |
  命令列表:
  /点歌 <歌名> [歌手] - 搜索并发送歌曲
  /歌单 - 查看当前共享歌单
  /加歌 <歌名> - 添加歌曲到共享歌单
  /切歌 - 投票切换下一首
  /当前 - 查看当前播放的歌曲
  /歌词 - 查看当前歌曲歌词
  /投票 <序号> - 投票想听的歌
  /收藏 - 收藏当前歌曲
  /我的收藏 - 查看个人收藏
  /推荐 - 根据历史推荐歌曲
  /音乐榜 - 查看热门排行榜
  /听歌帮助 - 查看详细帮助
version: "1.0.0"
author: tanhan8023-ux
repo: "https://github.com/tanhan8023-ux/astrbot_plugin_music_together"
